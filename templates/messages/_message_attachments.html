{% for attachment in message.attachments.all %}
  {% if attachment.is_image %}
  <a href="{% url 'message_attachment' attachment.pk %}" class="msg-attachment msg-attachment--image" target="_blank" rel="noopener">
    <img src="{% url 'message_attachment' attachment.pk %}" alt="{{ attachment.original_name }}" loading="lazy">
  </a>
  {% else %}
  <a href="{% url 'message_attachment' attachment.pk %}" class="msg-attachment msg-attachment--file" download>
    <span class="msg-attachment-icon" aria-hidden="true">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
      </svg>
    </span>
    <span class="msg-attachment-meta">
      <span class="msg-attachment-name">{{ attachment.original_name }}</span>
      <span class="msg-attachment-size">{{ attachment.size_bytes|filesizeformat }}</span>
    </span>
  </a>
  {% endif %}
{% endfor %}
