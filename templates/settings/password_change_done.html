{% extends 'base.html' %}
{% load static %}

{% block title %}Password Updated — TaskPin{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/settings.css' %}">
{% endblock %}

{% block content %}
<div class="settings-page settings-page--narrow">

  <section class="settings-card settings-card--centered">
    <div class="settings-success-icon">
      <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    </div>
    <h1 class="settings-heading">Password updated</h1>
    <p class="settings-sub">Your password has been changed successfully.</p>
    <a href="{% url 'user_settings' %}" class="btn-submit settings-done-link">Back to Settings</a>
  </section>

</div>
{% endblock %}
