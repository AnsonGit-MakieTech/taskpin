{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in — TaskPin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/auth.css' %}">
</head>
<body>
  <div class="login-wrap">
    <div class="login-brand">
      <span class="brand-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
          <path d="M16 12V4h1V2H7v2h1v8l-2 2v2h5.2v6h1.6v-6H18v-2l-2-2z"/>
        </svg>
      </span>
      <span class="brand-name">TaskPin</span>
    </div>

    <div class="login-card">
      <h1 class="login-heading">Welcome back</h1>
      <p class="login-sub">Sign in to your team board</p>

      {% if form.errors %}
      <ul class="error-list">
        <li>Incorrect username or password. Please try again.</li>
      </ul>
      {% endif %}

      <form method="post">
        {% csrf_token %}
        <div class="form-group">
          <label for="id_username">Username</label>
          <input type="text" name="username" id="id_username" autofocus autocomplete="username" required>
        </div>
        <div class="form-group">
          <label for="id_password">Password</label>
          <input type="password" name="password" id="id_password" autocomplete="current-password" required>
        </div>
        <input type="hidden" name="next" value="{{ next }}">
        <button type="submit" class="btn-login">Sign in</button>
      </form>

      <p class="auth-footer">
        No account yet?
        <a href="{% url 'register' %}">Create one</a>
      </p>
    </div>
  </div>
</body>
</html>
