<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in — TaskPin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #F8F6F0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      -webkit-font-smoothing: antialiased;
    }

    .login-wrap {
      width: 100%;
      max-width: 380px;
    }

    .login-brand {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 32px;
    }

    .brand-icon { color: #FFB74D; }

    .brand-name {
      font-size: 22px;
      font-weight: 700;
      color: #2E2E2E;
      letter-spacing: -0.4px;
    }

    .login-card {
      background: #fff;
      border-radius: 14px;
      padding: 32px 32px 28px;
      box-shadow: 0 4px 24px rgba(0,0,0,.08), 0 0 0 1px rgba(0,0,0,.05);
    }

    .login-heading {
      font-size: 18px;
      font-weight: 700;
      color: #2E2E2E;
      margin-bottom: 4px;
    }

    .login-sub {
      font-size: 13px;
      color: #777;
      margin-bottom: 24px;
    }

    .form-group { margin-bottom: 16px; }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #2E2E2E;
      margin-bottom: 6px;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 10px 13px;
      border: 1.5px solid #E0DED8;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      color: #2E2E2E;
      background: #FAFAF8;
      transition: border-color .15s, box-shadow .15s;
      outline: none;
    }

    input[type="text"]:focus,
    input[type="password"]:focus {
      border-color: #FFB74D;
      box-shadow: 0 0 0 3px rgba(255,183,77,.2);
      background: #fff;
    }

    .btn-login {
      width: 100%;
      padding: 11px;
      background: #FFB74D;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      font-family: inherit;
      color: #fff;
      cursor: pointer;
      margin-top: 8px;
      transition: background .15s;
      letter-spacing: .1px;
    }

    .btn-login:hover { background: #F4A020; }

    .error-list {
      background: #FFEBEE;
      border-radius: 8px;
      padding: 10px 14px;
      margin-bottom: 18px;
    }

    .error-list li {
      font-size: 13px;
      color: #C62828;
      list-style: none;
      font-weight: 500;
    }

    .error-list li + li { margin-top: 4px; }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-brand">
      <span class="brand-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
          <path d="M16 12V4h1V2H7v2h1v8l-2 2v2h5.2v6h1.6v-6H18v-2l-2-2z"/>
        </svg>
      </span>
      <span class="brand-name">TaskPin</span>
    </div>

    <div class="login-card">
      <h1 class="login-heading">Welcome back</h1>
      <p class="login-sub">Sign in to your team board</p>

      {% if form.errors %}
      <ul class="error-list">
        <li>Incorrect username or password. Please try again.</li>
      </ul>
      {% endif %}

      <form method="post">
        {% csrf_token %}
        <div class="form-group">
          <label for="id_username">Username</label>
          <input type="text" name="username" id="id_username" autofocus autocomplete="username" required>
        </div>
        <div class="form-group">
          <label for="id_password">Password</label>
          <input type="password" name="password" id="id_password" autocomplete="current-password" required>
        </div>
        <input type="hidden" name="next" value="{{ next }}">
        <button type="submit" class="btn-login">Sign in</button>
      </form>
    </div>
  </div>
</body>
</html>
